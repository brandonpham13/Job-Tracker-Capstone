<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Contacts</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-left">
        <img
          src="../images/contact_cubes.png"
          alt="cubes with email and phone symbols"
          class="clipboard-image"
        />
      </div>
      <div class="nav-links">
        <ul>
          <li><a href="applications.html">My Applications</a></li>
          <li><a href="contacts.html">Contacts</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="trends.html">Trends</a></li>
          <li><a href="#" id="logout-btn">Logout</a></li>
        </ul>
      </div>
    </nav>
    <main class="my-contacts">
      <h1>My Contacts</h1>
      <div class="button-row">
        <button class="filter-contacts primary-btn">Filter Contacts</button>
        <a href="add-contact.html" class="new-contact-btn primary-btn"
          >New Contact</a
        >
      </div>
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Contact Name</th>
          </tr>
        </thead>
        <tbody id="contacts-table"></tbody>
      </table>
      <div class="deleted-overlay hidden">
        <div class="deleted-content">
          <p>Once you delete this contact, you will be unable to re-add it.</p>
          <div>
            <button
              class="confirm-delete secondary-btn"
              data-id="${contact.id}"
            >
              Delete
            </button>
          </div>
          <div>
            <button class="cancel-delete secondary-btn">Cancel</button>
          </div>
        </div>
      </div>

      <div class="detail-overlay hidden">
        <div class="detail-content">
          <h2>Contact Details</h2>
          <form class="contact-detail-form">
            <div class="detail-form-row">
              <label for="modal-name">Contact Name</label>
              <input id="modal-name" type="text" required placeholder="Contact Name" />
            </div>
            <div class="detail-form-row">
              <label for="modal-linkedin">LinkedIn</label>
              <input id="modal-linkedin" type="url" placeholder="LinkedIn URL" />
            </div>
            <div class="detail-form-row">
              <label for="modal-last-contact">Last Contacted</label>
              <input id="modal-last-contact" type="datetime-local" />
            </div>
            <div class="detail-form-row">
              <label for="modal-notes">Notes</label>
              <textarea id="modal-notes" placeholder="Notes"></textarea>
            </div>
            <div class="detail-modal-actions">
              <button type="submit" class="secondary-btn modal-save-btn">Save Changes</button>
              <button type="button" class="modal-delete-btn">Delete</button>
              <button type="button" class="primary-btn modal-cancel-btn">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <div class="filter-sort-overlay hidden">
        <div class="filter-sort-content">
          <p>Select the filters you would like to apply.</p>
          <form>
            <div class="filter-sort-modal-row">
              <label>Sort:</label>
              <select id="sort-select">
                <option value=""></option>
                <option value="last-contact-date">Date Last Contacted</option>
                <option value="name">Name</option>
              </select>
            </div>
            <div class="filter-sort-modal-row">
              <label>filter-sort-btn:</label>
              <select id="filter-select">
                <option value=""></option>
                <option value="notes">Notes</option>
                <option value="no-notes">No Notes</option>
              </select>
            </div>
            <div class="filter-sort-modal-row">
              <button class="secondary-btn clear-filters" type="button">
                Clear Filters
              </button>
              <button class="secondary-btn submit-filters" type="button">
                Submit
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <script src="../scripts/auth.js"></script>
    <script>
      Auth.init().then(() => Auth.protect());
      document.getElementById("logout-btn").addEventListener("click", (e) => {
        e.preventDefault();
        Auth.signOut();
      });
    </script>
    <script type="module" src="../scripts/index.js"></script>
  </body>
</html>
