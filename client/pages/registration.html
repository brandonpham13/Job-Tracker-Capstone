<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker Registration</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <style>
      #sign-up-container {
        width: 100%;
        display: flex;
        justify-content: center;
        margin: 20px 0;
        min-height: 200px;
      }
      .landing-loading {
        font-size: 20px;
        color: #333;
        text-align: center;
        padding: 40px 0;
      }
    </style>
  </head>
  <body>
    <main class="login">
      <img
        src="../images/resumes.png"
        alt="stack of resumes"
        class="login-banner"
      />
      <h1>Job Tracker App</h1>
      <h2>Registration</h2>
      <p class="registration-description">Create your account</p>
      <div id="sign-up-container">
        <p class="landing-loading">Loading...</p>
      </div>
    </main>

    <script
      data-clerk-publishable-key=""
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    ></script>
    <script src="../scripts/auth.js"></script>
    <script>
      (async function () {
        await Auth.init();
        const clerk = await Auth.ready;

        if (clerk.user) {
          window.location.href = "/pages/applications.html";
          return;
        }

        const container = document.getElementById("sign-up-container");
        container.innerHTML = "";
        clerk.mountSignUp(container);
      })();
    </script>
  </body>
</html>
