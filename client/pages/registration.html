<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker Registration</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <main class="login">
      <img
        src="../images/resumes.png"
        alt="stack of resumes"
        class="login-banner"
      />
      <h1>Job Tracker App</h1>
      <h2>Registration</h2>
      <p class="registration-description">create your account</p>
      <form class="registration-box">
        <div class="registration-form-row">
          <label for="displayName">User Name</label>
          <input id="displayName" type="text" name="displayName" required />
        </div>
        <div class="registration-form-row">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" required />
        </div>
        <div class="registration-form-row">
          <label for="password">Password</label>
          <input id="password" type="password" name="password" required />
        </div>
        <div class="registration-buttons">
          <button type="button" class="primary-btn">Cancel</button>
          <button type="submit" class="primary-btn">Register</button>
        </div>
      </form>
    </main>
  </body>
</html>
