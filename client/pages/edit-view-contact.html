<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Details</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-left">
        <img
          src="../images/contact_cubes.png"
          alt="cubes with email and phone symbols"
          class="clipboard-image"
        />
      </div>
      <div class="nav-links">
        <ul>
          <li><a href="applications.html">My Applications</a></li>
          <li><a href="contacts.html">Contacts</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="trends.html">Trends</a></li>
          <li><a href="#" id="logout-btn">Logout</a></li>
        </ul>
      </div>
    </nav>
    <main class="edit-contact">
      <h1>Contact Details</h1>
      <p>View and update details of your contact.</p>
      <form class="edit-contact-form">
        <div class="edit-contact-form-row">
          <label for="name">Contact Name</label>
          <input
            required
            id="name"
            type="text"
            name="name"
            placeholder="Contact Name"
          />
        </div>
        <div class="edit-contact-form-row">
          <label for="linkedin_url">LinkedIn</label>
          <input
            id="linkedin_url"
            type="url"
            name="linkedin_url"
            placeholder="LinkedIn URL"
          />
        </div>
        <div class="edit-contact-form-row">
          <label for="last_contact_date">Last Contacted</label>
          <input
            id="last_contact_date"
            type="datetime-local"
            name="last_contact_date"
            placeholder="Date"
          />
        </div>
        <div class="edit-contact-form-row">
          <label for="notes">Interaction Notes</label>
          <textarea
            id="notes"
            name="notes"
            rows="5"
            placeholder="Notes"
          ></textarea>
        </div>
        <button type="submit">Update</button>
      </form>
    </main>
    <script src="../scripts/auth.js"></script>
    <script>
      Auth.init().then(() => Auth.protect());
      document.getElementById("logout-btn").addEventListener("click", (e) => {
        e.preventDefault();
        Auth.signOut();
      });
    </script>
    <script type="module" src="../scripts/index.js"></script>
  </body>
</html>
