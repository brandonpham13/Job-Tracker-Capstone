<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Details</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-left">
        <img
          src="../images/contact_cubes.png"
          alt="cubes with email and phone symbols"
          class="clipboard-image"
        />
      </div>
      <div class="nav-links">
        <ul>
          <li><a href="applications.html">My Applications</a></li>
          <li><a href="contacts.html">Contacts</a></li>
          <li><a href="trends.html">Trends</a></li>
          <li><a href="index.html">Logout</a></li>
        </ul>
      </div>
    </nav>
    <main class="edit-contact">
      <h1>Contact Details</h1>
      <p>View and update details of your contact.</p>
      <form class="edit-contact-form">
        <div class="edit-contact-form-row">
          <label for="name">Contact Name</label>
          <input
            required
            id="name"
            type="text"
            name="name"
            placeholder="Contact Name"
          />
        </div>
        <div class="edit-contact-form-row">
          <label for="company">Company</label>
          <input
            id="company"
            type="text"
            name="company"
            placeholder="Company or Organization"
          />
        </div>
        <div class="edit-contact-form-row">
          <label for="role">Role</label>
          <input
            id="role"
            type="text"
            name="role"
            placeholder="Contact's Role"
          />
        </div>
        <div class="edit-contact-form-row">
          <label for="phone">Phone Number</label>
          <input
            id="phone"
            type="tel"
            name="phone"
            placeholder="123-456-7890"
          />
        </div>
        <div class="edit-contact-form-row">
          <label for="email">E-Mail Address</label>
          <input
            id="email"
            type="email"
            name="email"
            placeholder="email@email.com"
          />
        </div>
        <div class="edit-contact-form-row">
          <label for="notes">Interaction Notes</label>
          <textarea
            id="notes"
            name="notes"
            rows="5"
            placeholder="Notes"
          ></textarea>
        </div>
        <button type="submit">Update</button>
      </form>
    </main>
  </body>
</html>
