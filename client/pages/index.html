<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <main class="login">
      <img
        src="../images/resumes.png"
        alt="stack of resumes"
        class="login-banner"
      />
      <h1>Job Tracker App</h1>
      <form class="login-box">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" required />
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required />
        <div class="login-buttons">
          <a href="registration.html" class="registration-btn primary-btn"
            >Register</a
          >
          <!--
          This is commented out to enable demonstration of the work thus far.
          anchor will be replace with button once frontend and backend
          are connected
          <button type="submit" class="primary-btn">Login</button>
        -->
          <a href="applications.html" class="registration-btn primary-btn"
            >Login</a
          >
        </div>
      </form>
      <p class="app-intro">
        A place to log your job and internship applications. You can track the
        applications status, skill requirements, and contact data, along with
        summary for skill requirements.
      </p>
    </main>
  </body>
</html>
