<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Applications</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-left">
        <img
          src="../images/clipboard.png"
          alt="clipboad with resumes and applications"
          class="clipboard-image"
        />
      </div>
      <div class="nav-links">
        <ul>
          <li><a href="applications.html">My Applications</a></li>
          <li><a href="contacts.html">Contacts</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="trends.html">Trends</a></li>
          <li><a href="#" id="logout-btn">Logout</a></li>
        </ul>
      </div>
    </nav>
    <main class="my-applications">
      <h1>My Applications</h1>
      <div class="button-row">
        <button class="filter-sort-btn primary-btn">Filter/Sort</button>
        <a href="add-application.html" class="new-application-btn primary-btn"
          >New Application</a
        >
      </div>
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Job/Internship</th>
            <th>Organization</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="applications-table"></tbody>
      </table>
      <div class="deleted-overlay hidden">
        <div class="deleted-content">
          <p>
            Once you delete this application, you will be unable to re-add it.
          </p>
          <div>
            <button class="confirm-delete secondary-btn" data-id="${job.id}">
              Delete
            </button>
          </div>
          <div>
            <button class="cancel-delete secondary-btn">Cancel</button>
          </div>
        </div>
      </div>

      <div class="filter-sort-overlay hidden">
        <div class="filter-sort-content">
          <p>Sorting</p>
          <form>
            <div class="filter-sort-modal-row">
              <label>Sort by:</label>
              <select id="sort-select">
                <option value="">Select an option</option>
                <option value="status">Status</option>
                <option value="organization">Organization</option>
                <option value="position-name">Position</option>
              </select>
            </div>
            <p>Select the filters you would like to apply.</p>
            <div class="filter-sort-modal-row">
              <label>Job Status:</label>
              <select id="filter-status-select">
                <option value="">Select a status</option>
                <option value="APPLIED">Applied</option>
                <option value="INTERVIEWING">Interviewing</option>
                <option value="Offer">Offer</option>
                <option value="REJECTED">Rejected</option>
                <option value="ACCEPTED">Accepted</option>
                <option value="WITHDRAWN">Withdrawn</option>
              </select>
            </div>
            <div class="filter-sort-modal-row">
              <label>Skill:</label>
              <select id="filter-skill-select">
                <option value="">Select an option</option>
              </select>
            </div>
            <div class="filter-sort-modal-row">
              <label>Organization:</label>
              <select id="filter-organization-select">
                <option value="">Select an option</option>
              </select>
            </div>
            <div class="filter-sort-modal-row">
              <button class="secondary-btn clear-filters" type="button">
                Clear Filters
              </button>
              <button class="secondary-btn submit-filters" type="button">
                Submit
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <script src="../scripts/auth.js"></script>
    <script>
      Auth.init().then(() => Auth.protect());
      document.getElementById("logout-btn").addEventListener("click", (e) => {
        e.preventDefault();
        Auth.signOut();
      });
    </script>
    <script type="module" src="../scripts/index.js"></script>
  </body>
</html>
