<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Skills</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-left">
        <img
          src="../images/clipboard.png"
          alt="clipboad with resumes and applications"
          class="clipboard-image"
        />
      </div>
      <div class="nav-links">
        <ul>
          <li><a href="applications.html">My Applications</a></li>
          <li><a href="contacts.html">Contacts</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="trends.html">Trends</a></li>
          <li><a href="#" id="logout-btn">Logout</a></li>
        </ul>
      </div>
    </nav>
    <main class="my-skills">
      <h1>My Skills</h1>
      <div class="button-row">
        <button class="filter-sort-btn primary-btn">Filter/Sort</button>
        <a href="add-skill.html" class="new-skill-btn primary-btn">New Skill</a>
      </div>
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Skill</th>
            <th>Category</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <button class="delete-btn">
                <i class="fa-solid fa-trash"></i>
              </button>
            </td>
            <td>Test</td>
            <td>Test</td>
          </tr>
        </tbody>
      </table>
      <div class="deleted-overlay hidden">
        <div class="deleted-content">
          <p>Once you delete this skill, you will be unable to re-add it.</p>
          <div>
            <button class="confirm-delete secondary-btn">Delete</button>
          </div>
          <div>
            <button class="cancel-delete secondary-btn">Cancel</button>
          </div>
        </div>
      </div>

      <div class="filter-sort-overlay hidden">
        <div class="filter-sort-content">
          <p>Sorting</p>
          <form>
            <div class="filter-sort-modal-row">
              <label>Sort by:</label>
              <select>
                <option value="">Select an option</option>
                <option value="category">Category</option>
              </select>
            </div>
            <p>Select the filters you would like to apply.</p>
            <div class="filter-sort-modal-row">
              <label>Category:</label>
              <select>
                <option value="">Select an option</option>
              </select>
            </div>
            <div class="filter-sort-modal-row">
              <button class="secondary-btn clear-filters">Clear Filters</button>
              <button class="secondary-btn submit-filters" type="submit">
                Submit
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <script
      data-clerk-publishable-key=""
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    ></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/index.js"></script>
    <script>
      Auth.init().then(() => Auth.protect());
      document.getElementById("logout-btn").addEventListener("click", (e) => {
        e.preventDefault();
        Auth.signOut();
      });
    </script>
  </body>
</html>
