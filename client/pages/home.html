<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-left">
        <img
          src="../images/clipboard.png"
          alt="clipboard with resumes and applications"
          class="clipboard-image"
        />
      </div>
      <div class="nav-links">
        <ul>
          <li><a href="applications.html">My Applications</a></li>
          <li><a href="contacts.html">Contacts</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="trends.html">Trends</a></li>
          <li><a href="#" id="logout-btn">Logout</a></li>
        </ul>
      </div>
    </nav>
    <main class="my-applications">
      <h1>Job Tracker App</h1>
      <p class="app-intro">
        A place to log your job and internship applications. You can track the
        applications status, skill requirements, and contact data, along with
        summary for skill requirements.
      </p>
      <div class="button-row" style="justify-content: center; gap: 20px">
        <a href="applications.html" class="new-application-btn primary-btn"
          >My Applications</a
        >
        <a href="contacts.html" class="new-contact-btn primary-btn"
          >My Contacts</a
        >
      </div>
    </main>
    <script src="../scripts/auth.js"></script>
    <script>
      Auth.init().then(() => Auth.protect());
      document.getElementById("logout-btn").addEventListener("click", (e) => {
        e.preventDefault();
        Auth.signOut();
      });
    </script>
  </body>
</html>
