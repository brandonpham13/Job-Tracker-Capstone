<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application Details</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-left">
        <img
          src="../images/clipboard.png"
          alt="clipboad with resumes and applications"
          class="clipboard-image"
        />
      </div>
      <div class="nav-links">
        <ul>
          <li><a href="applications.html">My Applications</a></li>
          <li><a href="contacts.html">Contacts</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="trends.html">Trends</a></li>
          <li><a href="#" id="logout-btn">Logout</a></li>
        </ul>
      </div>
    </nav>
    <main class="edit-application">
      <h1>Application Details</h1>
      <p>View and update details of your application.</p>
      <form class="edit-application-form">
        <div class="edit-application-form-row">
          <label for="role">Position Name</label>
          <input
            id="role"
            name="role"
            required
            type="text"
            placeholder="Position Name"
          />
        </div>
        <div class="add-application-form-row">
          <label for="company_name">Organization</label>
          <input
            id="company_name"
            name="company_name"
            type="text"
            placeholder="Company or Organization"
          />
        </div>
        <div class="add-application-form-row">
          <label for="status">Status</label>
          <select id="status" class="application-status" name="status" required>
            <option value="">Select a status</option>
            <option value="APPLIED">Applied</option>
            <option value="INTERVIEWING">Interviewing</option>
            <option value="OFFER">Offer</option>
            <option value="REJECTED">Rejected</option>
            <option value="Accepted">Accepted</option>
            <option value="WITHDRAWN">Withdrawn</option>
          </select>
        </div>
        <div class="add-application-form-row">
          <label for="application_date">Date Application is Due</label>
          <input
            id="application_date"
            name="application_date"
            type="datetime-local"
            placeholder="Date"
          />
        </div>
        <p>Required Skills</p>
        <div class="add-application-form-row">
          <label for="skill-1">Skill 1</label>
          <input id="skill-1" name="skill-1" type="text" placeholder="skill" />
        </div>
        <div class="add-application-form-row">
          <label for="skill-2">Skill 2</label>
          <input id="skill-2" name="skill-2" type="text" placeholder="skill" />
        </div>
        <div class="add-application-form-row">
          <label for="skill-3">Skill 3</label>
          <input id="skill-3" name="skill-3" type="text" placeholder="skill" />
        </div>
        <p>Useful Contacts</p>
        <div class="add-application-form-row">
          <label for="contact-1">Contact 1</label>
          <input
            id="contact-1"
            name="contact-1"
            type="text"
            placeholder="contact name"
          />
        </div>
        <div class="add-application-form-row">
          <label for="contact-2">Contact 2</label>
          <input
            id="contact-2"
            name="contact-2"
            type="text"
            placeholder="contact name"
          />
        </div>
        <div class="add-application-form-row">
          <label for="contact-3">Contact 3</label>
          <input
            id="contact-3"
            name="contact-3"
            type="text"
            placeholder="contact name"
          />
        </div>
        <button type="submit" class="secondary-btn">Update</button>
      </form>
    </main>
    <script src="../scripts/auth.js"></script>
    <script>
      Auth.init().then(() => Auth.protect());
      document.getElementById("logout-btn").addEventListener("click", (e) => {
        e.preventDefault();
        Auth.signOut();
      });
    </script>
    <script type="module" src="../scripts/index.js"></script>
  </body>
</html>
