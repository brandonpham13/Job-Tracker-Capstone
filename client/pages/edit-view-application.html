<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application Details</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-left">
        <img
          src="../images/clipboard.png"
          alt="clipboad with resumes and applications"
          class="clipboard-image"
        />
      </div>
      <div class="nav-links">
        <ul>
          <li><a href="applications.html">My Applications</a></li>
          <li><a href="contacts.html">Contacts</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="trends.html">Trends</a></li>
          <li><a href="index.html">Logout</a></li>
        </ul>
      </div>
    </nav>
    <main class="edit-application">
      <h1>Application Details</h1>
      <p>View and update details of your application.</p>
      <form class="edit-application-form">
        <div class="add-application-form-row">
          <label for="title">Position Name</label>
          <input id="title" required type="text" placeholder="Position Name" />
        </div>
        <div class="add-application-form-row">
          <label for="type">Position Type</label>
          <input required id="type" type="text" placeholder="Position Type" />
        </div>
        <div class="add-application-form-row">
          <label for="organization">Organization</label>
          <input
            id="organization"
            type="text"
            placeholder="Company or Organization"
          />
        </div>
        <div class="add-application-form-row">
          <label for="status">Status</label>
          <select class="application-status" required>
            <option value="">Select a status</option>
            <option value="saved">Saved</option>
            <option value="applied">Applied</option>
            <option value="interviewing">Interviewing</option>
            <option value="offer">Offer</option>
            <option value="rejected">Rejected</option>
            <option value="accepted">Accepted</option>
            <option value="withdrawn">Withdrawn</option>
          </select>
        </div>
        <div class="add-application-form-row">
          <label for="location">Location</label>
          <input id="location" type="text" placeholder="Location" />
        </div>
        <div class="add-application-form-row">
          <label for="url">URL/Website</label>
          <input id="url" type="url" placeholder="Website" />
        </div>
        <div class="add-application-form-row">
          <label for="description">Description</label>
          <input id="description" type="text" placeholder="Brief Description" />
        </div>
        <div class="add-application-form-row">
          <label for="appliedAt">Date Applied</label>
          <input id="appliedAt" type="datetime" placeholder="Date Applied" />
        </div>
        <div class="add-application-form-row">
          <label for="notes">Notes</label>
          <textarea
            id="notes"
            name="notes"
            rows="5"
            placeholder="Notes"
          ></textarea>
        </div>
        <p>Required Skills</p>
        <div class="add-application-form-row">
          <label for="skill-1">Skill 1</label>
          <input id="skill-1" type="text" placeholder="skill" />
        </div>
        <div class="add-application-form-row">
          <label for="skill-2">Skill 2</label>
          <input id="skill-2" type="text" placeholder="skill" />
        </div>
        <div class="add-application-form-row">
          <label for="skill-3">Skill 3</label>
          <input id="skill-3" type="text" placeholder="skill" />
        </div>
        <button type="submit" class="secondary-btn">Update</button>
      </form>
    </main>
  </body>
</html>
